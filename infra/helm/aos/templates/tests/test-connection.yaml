apiVersion: v1
kind: Pod
metadata:
  name: {{ include "aos.fullname" . }}-test-connection
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args: ["--timeout=5", "-qO-", "http://{{ include "aos.fullname" . }}-backend:8000/health"]
