apiVersion: v1
kind: Service
metadata:
  name: {{ include "aos.fullname" . }}-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aos.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "aos.backendSelectorLabels" . | nindent 4 }}
