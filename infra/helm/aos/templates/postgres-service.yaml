{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aos.fullname" . }}-postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aos.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "aos.postgresSelectorLabels" . | nindent 4 }}
{{- end }}
