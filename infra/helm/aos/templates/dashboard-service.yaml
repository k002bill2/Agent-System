apiVersion: v1
kind: Service
metadata:
  name: {{ include "aos.fullname" . }}-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "aos.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "aos.dashboardSelectorLabels" . | nindent 4 }}
