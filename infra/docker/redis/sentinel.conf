# ═══════════════════════════════════════════════════════════════
# Redis Sentinel Configuration for AOS HA
# ═══════════════════════════════════════════════════════════════

# Sentinel port
port 26379

# Monitor the master (aos-master is the master name)
# The last number is the quorum - number of sentinels that need to agree
# for failover to happen
sentinel monitor aos-master redis-master 6379 2

# Authentication (if Redis requires password)
# sentinel auth-pass aos-master yourpassword

# Time in milliseconds a master should be unreachable before failover
sentinel down-after-milliseconds aos-master 5000

# Timeout for failover operation
sentinel failover-timeout aos-master 60000

# Number of replicas that can be reconfigured in parallel during failover
sentinel parallel-syncs aos-master 1

# Notification script (optional)
# sentinel notification-script aos-master /path/to/notify.sh

# Client reconfiguration script (optional)
# sentinel client-reconfig-script aos-master /path/to/reconfig.sh

# Deny writes to master if fewer than 1 replica is connected
# (optional - for data safety)
# sentinel deny-scripts-reconfig yes

# Logging
loglevel notice
