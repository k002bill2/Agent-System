# ═══════════════════════════════════════════════════════════════
# PostgreSQL Replica Configuration for AOS HA
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────
# Connection Settings
# ─────────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# ─────────────────────────────────────────────────────────────
# Memory Settings (match primary)
# ─────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB
wal_buffers = 16MB

# ─────────────────────────────────────────────────────────────
# Hot Standby Settings
# ─────────────────────────────────────────────────────────────
hot_standby = on
hot_standby_feedback = on
wal_receiver_status_interval = 10s
max_standby_streaming_delay = 30s
max_standby_archive_delay = 30s

# ─────────────────────────────────────────────────────────────
# WAL Settings
# ─────────────────────────────────────────────────────────────
wal_level = replica
max_wal_senders = 10
wal_keep_size = 1GB

# ─────────────────────────────────────────────────────────────
# Recovery Settings
# ─────────────────────────────────────────────────────────────
primary_conninfo = 'host=postgres-primary port=5432 user=postgres password=postgres'
# primary_slot_name = 'replica_slot'  # Use replication slots if configured

# ─────────────────────────────────────────────────────────────
# Query Planning
# ─────────────────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ─────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
