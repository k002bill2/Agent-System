apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aos-ingress
  namespace: aos
  labels:
    app.kubernetes.io/name: aos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aos.example.com
      secretName: aos-tls
  rules:
    - host: aos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aos-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aos-dashboard
                port:
                  number: 80
