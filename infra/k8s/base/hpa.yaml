apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aos-backend-hpa
  namespace: aos
  labels:
    app.kubernetes.io/name: aos
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aos-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
