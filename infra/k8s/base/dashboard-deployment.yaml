apiVersion: apps/v1
kind: Deployment
metadata:
  name: aos-dashboard
  namespace: aos
  labels:
    app.kubernetes.io/name: aos
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aos
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aos
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: aos-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
