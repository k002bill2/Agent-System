apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aos-postgres
  namespace: aos
  labels:
    app.kubernetes.io/name: aos
    app.kubernetes.io/component: postgres
spec:
  serviceName: aos-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aos
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aos
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: aos
            - name: POSTGRES_USER
              value: aos
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aos-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
