apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aos-redis
  namespace: aos
  labels:
    app.kubernetes.io/name: aos
    app.kubernetes.io/component: redis
spec:
  serviceName: aos-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aos
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aos
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
