decisions:
  # ---------------------------------------------------------------------------
  # ADR-001: LangGraph 기반 멀티 에이전트 오케스트레이션
  # ---------------------------------------------------------------------------
  - id: ADR-001
    title: "LangGraph를 에이전트 오케스트레이션 엔진으로 채택"
    status: accepted
    date: "2025-01"
    context: |
      멀티 에이전트 워크플로우를 구현하기 위한 오케스트레이션 프레임워크가 필요했다.
      에이전트 간 상태 공유, 조건부 라우팅, 병렬 실행, 자가 수정(self-correction),
      그리고 Human-in-the-Loop(HITL) 승인 플로우를 지원해야 했다.
      AutoGen, CrewAI, 순수 LangChain 등을 검토했으나, StateGraph 기반의
      명시적 그래프 정의와 노드 간 라우팅이 가장 직관적이었다.
    decision: |
      LangGraph 0.2+를 핵심 오케스트레이션 엔진으로 채택한다.
      - StateGraph로 워크플로우를 정의하고 conditional edges로 라우팅
      - 5개 핵심 노드: Orchestrator, Planner, Executor, Reviewer, SelfCorrection
      - ParallelExecutor로 독립 태스크 병렬 처리
      - AgentState TypedDict로 노드 간 상태 전달
      - HITL 노드로 위험 작업 전 사용자 승인 요청
    consequences:
      positive:
        - "명시적 그래프 구조로 워크플로우 이해/디버깅 용이"
        - "StateGraph의 conditional edges로 유연한 라우팅"
        - "LangChain 에코시스템(도구, LLM, 벡터스토어) 자연스러운 통합"
        - "HITL 승인 플로우를 그래프 노드로 깔끔하게 구현"
      negative:
        - "LangGraph 버전 업데이트 시 breaking change 위험"
        - "LangChain/LangGraph 의존성 체인이 무거움"
        - "커스텀 병렬 실행 로직 별도 구현 필요 (ParallelExecutorNode)"
    tags: [orchestration, langgraph, multi-agent, core-architecture]

  # ---------------------------------------------------------------------------
  # ADR-002: React + Zustand (Redux 배제)
  # ---------------------------------------------------------------------------
  - id: ADR-002
    title: "상태 관리를 Zustand으로 채택, Redux 배제"
    status: accepted
    date: "2025-01"
    context: |
      대시보드 프론트엔드의 상태 관리 라이브러리를 선택해야 했다.
      Redux(+ Redux Toolkit), Jotai, Recoil, Zustand을 비교 검토했다.
      프로젝트 규모 대비 Redux의 보일러플레이트가 과도하고,
      여러 독립적인 도메인 스토어(프로젝트, 세션, 오케스트레이션, Git 등)를
      분리 관리해야 하는 요구사항이 있었다.
    decision: |
      Zustand 5.0을 상태 관리 라이브러리로 채택한다.
      - 도메인별 독립 스토어: projectConfigs, claudeSessions, orchestration, diff 등
      - create<State>((set) => ({...})) 패턴 통일
      - 전역 상태 최소화, 로컬 상태(useState) 우선 원칙
      - 스토어 파일은 stores/ 디렉토리에 집중 배치
    consequences:
      positive:
        - "최소 보일러플레이트 — 스토어 정의가 간결"
        - "도메인별 독립 스토어로 관심사 분리 용이"
        - "React 외부에서도 상태 접근 가능 (테스트 용이)"
        - "번들 크기 최소 (Redux 대비 약 1/10)"
      negative:
        - "대규모 팀에서 Redux DevTools만큼의 디버깅 도구 부족"
        - "미들웨어 생태계가 Redux 대비 제한적"
        - "스토어 간 의존성 관리를 수동으로 해야 함"
    tags: [frontend, state-management, zustand, react]

  # ---------------------------------------------------------------------------
  # ADR-003: Tailwind CSS 전용 (CSS Modules 배제)
  # ---------------------------------------------------------------------------
  - id: ADR-003
    title: "스타일링을 Tailwind CSS 전용으로 통일"
    status: accepted
    date: "2025-01"
    context: |
      대시보드 UI 스타일링 방식을 결정해야 했다.
      CSS Modules, styled-components, Tailwind CSS를 비교했다.
      빠른 프로토타이핑, 일관된 디자인 시스템, 다크모드 지원이 핵심 요구사항이었다.
    decision: |
      Tailwind CSS 3.4를 유일한 스타일링 방식으로 채택한다.
      - 인라인 style={} 금지, Tailwind 클래스만 사용
      - 다크모드: dark: prefix 필수 적용
      - 반응형: mobile-first (sm:, md:, lg:)
      - 조건부 클래스: cn() 유틸리티 (clsx + tailwind-merge)
      - CSS 파일 직접 작성 금지 (global.css의 @tailwind 디렉티브만 허용)
    consequences:
      positive:
        - "유틸리티 우선 접근으로 빠른 UI 개발"
        - "dark: prefix로 다크모드 일관 지원"
        - "CSS 파일 수 최소화 — 스타일 충돌 원천 차단"
        - "tailwind-merge로 클래스 충돌 자동 해결"
      negative:
        - "긴 className 문자열로 JSX 가독성 저하 가능"
        - "커스텀 디자인 토큰은 tailwind.config.js에서 관리 필요"
        - "Tailwind 미경험 팀원의 학습 곡선"
    tags: [frontend, styling, tailwind, dark-mode]

  # ---------------------------------------------------------------------------
  # ADR-004: FastAPI + SQLAlchemy Async
  # ---------------------------------------------------------------------------
  - id: ADR-004
    title: "백엔드를 FastAPI + SQLAlchemy Async로 구축"
    status: accepted
    date: "2025-01"
    context: |
      LangGraph 오케스트레이션 엔진과 통합될 REST/WebSocket API 서버가 필요했다.
      Django, Flask, FastAPI를 비교했으며, async-first 아키텍처와
      Pydantic 기반 자동 검증/문서화가 결정적이었다.
      ORM은 SQLAlchemy 2.0의 native async 지원을 활용하기로 했다.
    decision: |
      FastAPI 0.115+ + SQLAlchemy 2.0+ (async) 조합을 채택한다.
      - asyncpg 드라이버로 PostgreSQL 비동기 연결
      - Service Layer 패턴: Router -> Service -> Repository
      - Pydantic 모델로 request/response 자동 검증
      - Dependency Injection: Depends(get_session)
      - Alembic으로 DB 마이그레이션 관리
    consequences:
      positive:
        - "async/await로 LangGraph와 자연스러운 통합"
        - "Pydantic 모델로 타입 안전한 API"
        - "자동 OpenAPI/Swagger 문서 생성"
        - "높은 동시성 처리 (I/O 바운드 작업 최적)"
      negative:
        - "asyncpg prepared statement 캐시 충돌 주의 필요"
        - "SQLAlchemy async 세션 관리 복잡도"
        - "sync 라이브러리 사용 시 run_in_executor 필요"
    tags: [backend, fastapi, sqlalchemy, async, postgresql]

  # ---------------------------------------------------------------------------
  # ADR-005: 하이브리드 모노레포 구조
  # ---------------------------------------------------------------------------
  - id: ADR-005
    title: "Claude Code 설정과 시스템 코드를 단일 모노레포로 관리"
    status: accepted
    date: "2025-02"
    context: |
      Claude Code의 .claude/ 설정(스킬, 에이전트, 커맨드, 훅)과
      실제 시스템 소스 코드(백엔드, 대시보드)를 어떻게 관리할지 결정해야 했다.
      별도 레포로 분리 시 설정과 코드 간 동기화 문제가 예상되었고,
      Claude Code가 프로젝트 루트의 .claude/를 자동 인식하는 특성을 활용하고자 했다.
    decision: |
      단일 모노레포에서 .claude/ 설정과 src/ 소스 코드를 함께 관리한다.
      - .claude/: skills, agents, commands, hooks, rules
      - src/backend/: Python 백엔드
      - src/dashboard/: React 프론트엔드
      - tests/: 통합 테스트
      - infra/: Docker, 배포 스크립트
      - docs/: PRD, TRD, 아키텍처 문서
    consequences:
      positive:
        - "Claude Code 설정과 코드의 원자적 커밋"
        - ".claude/ 변경의 즉시 반영"
        - "단일 PR로 설정+코드 함께 리뷰"
        - "CLAUDE.md에서 전체 프로젝트 컨텍스트 제공"
      negative:
        - "레포 크기 증가"
        - "프론트엔드/백엔드 독립 배포 시 추가 설정 필요"
        - "Git worktree 사용 시 .claude/ 경로 관리 주의"
    tags: [architecture, monorepo, claude-code, repository]

  # ---------------------------------------------------------------------------
  # ADR-006: font-mono 클래스 사용 금지
  # ---------------------------------------------------------------------------
  - id: ADR-006
    title: "font-mono Tailwind 클래스 사용 금지"
    status: accepted
    date: "2026-02"
    context: |
      대시보드 전반에서 font-mono 클래스가 사용되어 monospace 폰트가
      간헐적으로 적용되었다. 시스템 기본 폰트와의 불일치로 시각적 통일성이 깨졌고,
      한국어 텍스트에서 monospace 폰트가 가독성을 저하시켰다.
      전체 UI를 시스템 기본 폰트로 통일하기로 결정했다.
    decision: |
      font-mono Tailwind 클래스의 사용을 프로젝트 규칙으로 금지한다.
      - .claude/rules/aos-frontend.md에 명시적 금지 규칙 추가
      - 기존 font-mono 사용처 전면 제거
      - 코드 블록 등 기술적으로 monospace가 필요한 경우도 시스템 폰트 유지
    consequences:
      positive:
        - "시각적 일관성 확보"
        - "한국어 텍스트 가독성 향상"
        - "폰트 로딩 최적화 (추가 웹폰트 불필요)"
      negative:
        - "코드 스니펫 표시 시 monospace 없이 가독성 저하 가능"
    tags: [frontend, tailwind, typography, ui-consistency]

  # ---------------------------------------------------------------------------
  # ADR-007: ACE Framework 폐기
  # ---------------------------------------------------------------------------
  - id: ADR-007
    title: "ACE (Autonomous Cognitive Entity) Framework 폐기"
    status: accepted
    date: "2026-03"
    context: |
      ACE Framework는 멀티 에이전트 실행을 위한 4-Pillar 거버넌스 모델
      (soft constraints, hard constraints, boundaries, optimization)로
      도입되었으나, 실제 운영에서 과도한 복잡성과 유지보수 부담을 초래했다.
      enforcement-matrix.md, aceMatrixSync 등의 동기화 로직이 drift 문제를
      발생시켰고, 실질적 가치 대비 관리 비용이 높았다.
    decision: |
      ACE Framework를 프로젝트에서 폐기한다.
      - .claude/skills/ace-framework/ 디렉토리 삭제
      - claude-workspace-template에서 ace-framework.md 참조 제거
      - aceMatrixSync 관련 코드 정리
      - 개별 규칙(.claude/rules/)과 hooks.json으로 거버넌스 대체
    consequences:
      positive:
        - "유지보수 부담 대폭 감소"
        - "drift 문제 원천 해결"
        - "단순한 규칙 기반 거버넌스로 이해도 향상"
      negative:
        - "체계적 거버넌스 프레임워크 부재"
        - "개별 규칙 간 일관성을 수동으로 관리해야 함"
    tags: [governance, ace-framework, deprecation, simplification]

  # ---------------------------------------------------------------------------
  # ADR-008: 심볼릭 링크 기반 프로젝트 등록
  # ---------------------------------------------------------------------------
  - id: ADR-008
    title: "외부 프로젝트를 심볼릭 링크로 등록"
    status: accepted
    date: "2025-12"
    context: |
      AOS 대시보드에서 외부 프로젝트를 모니터링하려면 프로젝트를
      시스템에 등록해야 했다. 프로젝트 소스를 복사하는 방식은 비효율적이고
      동기화 문제를 유발했다. 프로젝트 원본을 건드리지 않으면서
      백엔드가 접근할 수 있는 방법이 필요했다.
    decision: |
      외부 프로젝트 등록 시 projects/ 디렉토리에 심볼릭 링크를 생성한다.
      - POST /api/projects/link로 심볼릭 링크 생성
      - 소스 파일은 절대 삭제하지 않음, 링크만 관리
      - Docker 환경에서는 심볼릭 링크 생략 (볼륨 마운트 사용)
      - 프로젝트 삭제 시 심볼릭 링크만 제거
    consequences:
      positive:
        - "원본 프로젝트 파일 안전 보장"
        - "디스크 공간 절약 (복사 불필요)"
        - "프로젝트 변경사항 실시간 반영"
      negative:
        - "심볼릭 링크가 깨질 수 있음 (소스 이동/삭제 시)"
        - "Windows 환경에서 권한 문제 가능"
        - "Docker 환경에서 별도 처리 필요"
    tags: [project-management, filesystem, symlink, registration]

  # ---------------------------------------------------------------------------
  # ADR-009: OAuth + JWT 세션 인증 패턴
  # ---------------------------------------------------------------------------
  - id: ADR-009
    title: "OAuth (Google/GitHub) + JWT 토큰 기반 인증"
    status: accepted
    date: "2025-06"
    context: |
      대시보드와 API 접근에 대한 인증 시스템이 필요했다.
      자체 인증만으로는 사용자 편의가 부족하고, OAuth만으로는
      이메일/비밀번호 로그인을 지원할 수 없었다.
      두 방식을 모두 지원하되, 토큰 관리는 JWT로 통일하기로 했다.
    decision: |
      OAuth (Google, GitHub) + Email/Password 하이브리드 인증을 구현한다.
      - OAuth: Google, GitHub 프로바이더 지원
      - Email/Password: bcrypt (rounds=12) 해싱, SHA-256 레거시 자동 업그레이드
      - JWT 토큰 페어: access token (15분) + refresh token (7일)
      - 조직 멤버십 기반 역할 동기화 (owner/admin -> admin, member -> user)
      - super_admin_emails 환경변수로 슈퍼 관리자 지정
    consequences:
      positive:
        - "소셜 로그인으로 가입 장벽 최소화"
        - "JWT로 stateless API 인증"
        - "레거시 해시 자동 마이그레이션으로 보안 강화"
        - "조직 기반 RBAC"
      negative:
        - "OAuth 프로바이더별 코드 유지보수"
        - "JWT refresh 로직의 복잡도"
        - "토큰 탈취 시 access token 만료까지 위험"
    tags: [auth, oauth, jwt, security, rbac]

  # ---------------------------------------------------------------------------
  # ADR-010: Qdrant을 RAG 벡터 스토어로 채택
  # ---------------------------------------------------------------------------
  - id: ADR-010
    title: "RAG 벡터 스토어를 ChromaDB에서 Qdrant으로 마이그레이션"
    status: accepted
    date: "2025-09"
    context: |
      프로젝트 컨텍스트 기반 RAG를 위한 벡터 데이터베이스가 필요했다.
      초기에 ChromaDB를 사용했으나, 프로덕션 환경에서의 안정성,
      하이브리드 검색(semantic + BM25), 필터링 성능이 부족했다.
      Qdrant의 Rust 기반 고성능 엔진과 풍부한 필터링 API를 평가하여 마이그레이션을 결정했다.
    decision: |
      Qdrant을 RAG 벡터 스토어로 채택하고 ChromaDB에서 마이그레이션한다.
      - qdrant-client + langchain-qdrant 사용
      - 하이브리드 검색: semantic + BM25 (RRF fusion), 환경변수로 on/off
      - CrossEncoder 리랭킹 지원 (선택적)
      - Language-aware chunking (RecursiveCharacterTextSplitter)
      - 임베딩: HuggingFace 기본, OpenAI/Google 선택 가능
    consequences:
      positive:
        - "Rust 기반 고성능 벡터 검색"
        - "풍부한 필터 API (FieldCondition, MatchValue 등)"
        - "하이브리드 검색으로 검색 품질 향상"
        - "Docker로 간편 배포"
      negative:
        - "추가 인프라 컴포넌트 (Qdrant 서버)"
        - "ChromaDB 대비 러닝 커브"
        - "Optional 의존성 관리 복잡도 증가"
    tags: [rag, vector-db, qdrant, search, migration]

  # ---------------------------------------------------------------------------
  # ADR-011: Vite 기반 프론트엔드 빌드
  # ---------------------------------------------------------------------------
  - id: ADR-011
    title: "프론트엔드 빌드 도구를 Vite로 채택"
    status: accepted
    date: "2025-01"
    context: |
      React 대시보드의 빌드/개발 도구를 선택해야 했다.
      Create React App(CRA)은 유지보수 중단 상태이고,
      Webpack 직접 설정은 복잡도가 높았다.
      Vite의 ESM 기반 빠른 HMR과 간결한 설정이 매력적이었다.
    decision: |
      Vite 6.0+를 프론트엔드 빌드 도구로 채택한다.
      - @vitejs/plugin-react 사용
      - @ 경로 별칭 설정 (resolve.alias)
      - 개발 서버 포트: 5173
      - API 프록시: /api -> localhost:8000
      - WebSocket 프록시: /ws -> ws://localhost:8000
    consequences:
      positive:
        - "ESM 기반 즉시 시작 (콜드 스타트 < 1초)"
        - "빠른 HMR (Hot Module Replacement)"
        - "간결한 설정 파일"
        - "Rollup 기반 최적화된 프로덕션 빌드"
      negative:
        - "CJS 전용 라이브러리 호환성 문제 간혹 발생"
        - "Webpack 플러그인 생태계 미호환"
    tags: [frontend, build-tool, vite, dx]

  # ---------------------------------------------------------------------------
  # ADR-012: 멀티 LLM 프로바이더 지원 (LLM Router)
  # ---------------------------------------------------------------------------
  - id: ADR-012
    title: "멀티 LLM 프로바이더 라우팅 시스템 구축"
    status: accepted
    date: "2025-06"
    context: |
      단일 LLM 프로바이더에 대한 의존도를 줄이고, 용도별 최적의 모델을
      선택할 수 있는 유연성이 필요했다. 비용 최적화, 장애 대응(fallback),
      모델 성능 비교 등의 요구사항이 있었다.
    decision: |
      LLM Router 서비스를 구축하여 멀티 프로바이더를 지원한다.
      - 기본 프로바이더: Google Gemini
      - 추가 프로바이더: Anthropic Claude, Ollama (로컬)
      - LLM_PROVIDER 환경변수로 기본 프로바이더 설정
      - llm_router_service.py에서 프로바이더 초기화 및 중복 방지
      - LangChain 추상화로 프로바이더 간 인터페이스 통일
    consequences:
      positive:
        - "프로바이더 장애 시 자동 fallback 가능"
        - "용도별 최적 모델 선택 (비용 vs 성능)"
        - "로컬 LLM (Ollama)으로 오프라인 개발 지원"
      negative:
        - "프로바이더별 API 차이로 추상화 누수 가능"
        - "모델별 프롬프트 최적화 필요"
        - "테스트 시 모든 프로바이더 커버 어려움"
    tags: [llm, multi-provider, router, gemini, claude, ollama]

  # ---------------------------------------------------------------------------
  # ADR-013: hooks.json을 프로젝트 훅의 유일한 정식 소스로 지정
  # ---------------------------------------------------------------------------
  - id: ADR-013
    title: "hooks.json을 프로젝트 훅 설정의 Single Source of Truth로 지정"
    status: accepted
    date: "2026-01"
    context: |
      Claude Code 프로젝트 훅 설정이 여러 위치(.claude/settings.json,
      hooks.json, 에이전트 프롬프트 등)에 분산되어 동기화 drift 문제가
      반복되었다. ACE Framework의 enforcement-matrix.md와의 불일치도
      발생했다. 단일 진실의 소스(SSOT)가 필요했다.
    decision: |
      .claude/settings.json 내의 hooks 섹션(= hooks.json)을
      프로젝트 훅의 유일한 정식 소스로 지정한다.
      - 백엔드 API가 hooks.json을 직접 읽어서 훅 목록 제공
      - 대시보드는 API를 통해 훅 정보 표시/편집
      - 다른 문서/파일에서의 훅 정의는 참조용으로만 간주
    consequences:
      positive:
        - "설정 drift 원천 차단"
        - "단일 편집 포인트로 관리 용이"
        - "API를 통한 프로그래밍적 훅 관리"
      negative:
        - "settings.json 파일 크기 증가 가능"
        - "Git 충돌 가능성 (여러 사람이 동시 수정 시)"
    tags: [hooks, configuration, ssot, claude-code]

  # ---------------------------------------------------------------------------
  # ADR-014: Vitest를 프론트엔드 테스트 프레임워크로 채택
  # ---------------------------------------------------------------------------
  - id: ADR-014
    title: "프론트엔드 테스트를 Vitest + Testing Library로 통일"
    status: accepted
    date: "2025-03"
    context: |
      Vite 기반 프로젝트에서 Jest를 사용하려면 추가 변환 설정이 필요하고,
      ESM 호환성 문제가 빈번했다. Vite와 동일한 변환 파이프라인을
      사용하는 Vitest가 자연스러운 선택이었다.
    decision: |
      Vitest + @testing-library/react를 프론트엔드 테스트 표준으로 채택한다.
      - Vitest: Vite와 동일한 설정/플러그인 공유
      - @testing-library/react: 컴포넌트 렌더링/이벤트 테스트
      - @testing-library/jest-dom: DOM assertion 확장
      - jsdom 환경에서 실행
      - __tests__/ 디렉토리 또는 컴포넌트 옆 배치
    consequences:
      positive:
        - "Vite 설정 공유로 제로-설정에 가까움"
        - "ESM 네이티브 지원"
        - "Jest 호환 API로 학습 곡선 최소"
        - "Watch 모드에서 빠른 피드백"
      negative:
        - "Jest 대비 성숙도가 낮은 영역 (snapshot 등) 존재"
        - "일부 Jest 플러그인 미호환"
    tags: [testing, vitest, frontend, testing-library]

  # ---------------------------------------------------------------------------
  # ADR-015: MCP (Model Context Protocol) 기반 외부 도구 통합
  # ---------------------------------------------------------------------------
  - id: ADR-015
    title: "외부 도구 통합을 MCP로 표준화"
    status: accepted
    date: "2025-08"
    context: |
      에이전트가 파일시스템, GitHub, 브라우저 등 외부 도구를 사용해야 했다.
      각 도구를 개별 통합하면 인터페이스가 파편화되고 유지보수 부담이 증가했다.
      Anthropic의 MCP(Model Context Protocol)가 도구 통합의 표준 프로토콜로
      부상하고 있었다.
    decision: |
      MCP를 외부 도구 통합의 표준 프로토콜로 채택한다.
      - 지원 MCP 서버: filesystem, github, playwright
      - mcp_config_manager.py로 서버 설정 관리
      - mcp_service.py로 도구 실행 추상화
      - MCPToolExecutor로 LangGraph 노드에서 도구 호출
      - 대시보드에서 MCP 서버 상태 모니터링 및 도구 호출 UI
    consequences:
      positive:
        - "표준 프로토콜로 도구 통합 일관성"
        - "새 도구 추가 시 MCP 서버만 등록하면 됨"
        - "Claude Code 생태계와 자연스러운 통합"
      negative:
        - "MCP 프로토콜 자체가 아직 초기 단계"
        - "MCP 서버 프로세스 관리 복잡도"
        - "도구별 MCP 서버 가용성에 의존"
    tags: [mcp, tools, integration, claude-code, protocol]

  # ---------------------------------------------------------------------------
  # ADR-016: Dev Docs 3-파일 시스템
  # ---------------------------------------------------------------------------
  - id: ADR-016
    title: "대규모 작업을 위한 Dev Docs 3-파일 컨텍스트 시스템"
    status: accepted
    date: "2026-01"
    context: |
      Claude Code와 협업 시 긴 대화에서 컨텍스트가 유실되는 문제가 반복되었다.
      특히 멀티 세션에 걸친 대규모 작업에서 이전 결정사항, 진행 상태,
      남은 작업 목록이 휘발되었다. 구조화된 컨텍스트 유지 시스템이 필요했다.
    decision: |
      대규모 작업마다 3개 파일로 컨텍스트를 관리하는 Dev Docs 시스템을 도입한다.
      - dev/active/[task-name]/[task-name]-plan.md: 승인된 구현 계획
      - dev/active/[task-name]/[task-name]-context.md: 핵심 결정사항/배경
      - dev/active/[task-name]/[task-name]-tasks.md: 체크리스트/진행 상태
      - 워크플로우: /dev-docs -> 구현 -> /update-dev-docs -> /compact
    consequences:
      positive:
        - "세션 간 컨텍스트 유지"
        - "결정사항 이력 추적"
        - "진행 상태 명시적 관리"
        - "/compact 시 핵심 정보만 압축 유지"
      negative:
        - "파일 관리 오버헤드"
        - "팀원이 Dev Docs 업데이트를 잊을 수 있음"
    tags: [workflow, context-management, dev-docs, claude-code]
