# Agent Orchestration Service - Docker Compose (Development)
# Hot-reload enabled for backend and dashboard
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml up -d   # detached
#
# Port override (e.g. when local PostgreSQL occupies 5432):
#   PG_PORT=5433 docker compose -f docker-compose.dev.yml up

services:
  # FastAPI Backend (hot-reload)
  backend:
    build:
      context: ./src/backend
      dockerfile: ../../infra/docker/Dockerfile.backend.dev
    container_name: aos-backend-dev
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aos:aos@postgres:5432/aos
      - USE_DATABASE=true
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LLM_PROVIDER=${LLM_PROVIDER:-google}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:-aos-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:${DASHBOARD_PORT:-5173}
      - DEBUG=true
    volumes:
      - ./src/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - aos-network

  # React Dashboard (Vite HMR)
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile.dev
    container_name: aos-dashboard-dev
    ports:
      - "${DASHBOARD_PORT:-5173}:5173"
    volumes:
      - ./src/dashboard:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aos-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: aos-postgres-dev
    environment:
      POSTGRES_USER: aos
      POSTGRES_PASSWORD: aos
      POSTGRES_DB: aos
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aos -d aos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aos-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aos-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aos-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aos-qdrant-dev
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aos-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  qdrant_dev_data:
    driver: local

networks:
  aos-network:
    driver: bridge
